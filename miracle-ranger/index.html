<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>미라클 레인저 — 박사의 하루</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Do+Hyeon&family=Noto+Serif+KR:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;user-select:none}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'Gowun Dodum',sans-serif;overflow:hidden;word-break:keep-all}
#game{width:420px;height:720px;position:relative;overflow:hidden;border:2px solid #333;border-radius:8px;background:#0a0a0a;transform-origin:center center}
.screen{display:none;width:100%;height:100%;position:absolute;top:0;left:0;flex-direction:column}
.screen.active{display:flex}

/* TITLE */
#title-screen{background:linear-gradient(180deg,#87CEEB 0%,#FFB347 25%,#2c2c54 55%,#1a1a2e 100%);align-items:center;justify-content:center;text-align:center}
.t-top{font-size:13px;color:#ffd700;letter-spacing:8px;z-index:1;font-family:'Do Hyeon',sans-serif}
.t-main{font-family:'Do Hyeon',sans-serif;font-size:36px;color:#e53935;text-shadow:3px 3px 0 #ffd600,6px 6px 0 rgba(0,0,0,0.3),0 0 24px rgba(229,57,53,0.5);letter-spacing:5px;z-index:1;margin-top:4px;transform:skewX(-4deg);-webkit-text-stroke:1px #b71c1c;paint-order:stroke fill}
.t-sub{font-size:14px;color:#ccc;letter-spacing:3px;z-index:1;margin-top:8px;font-family:'Noto Serif KR',serif}
.t-rangers{display:flex;gap:8px;margin-top:40px;z-index:1}
.t-start{z-index:1;cursor:pointer;font-size:16px;color:#fff;letter-spacing:4px;background:none;border:none;font-family:'Do Hyeon',sans-serif;padding:10px 32px;border-radius:8px;transition:all 0.2s}
.city-sil{position:absolute;bottom:100px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:3px;opacity:0.6}
.city-sil div{background:#1a1a2e;border-radius:2px 2px 0 0}

/* SCENE */
#scene-screen{flex-direction:column}
.scene-bg{flex:1;position:relative;overflow:hidden;transition:background 1.5s ease}
.bg-sky{background:linear-gradient(180deg,#87CEEB 0%,#B0C4DE 60%,#8899aa 100%)}
.bg-sunset{background:linear-gradient(180deg,#ff6b35 0%,#f7931e 20%,#2c2c54 60%,#1a1a2e 100%)}
.bg-lab{background:linear-gradient(180deg,#e8e0d0 0%,#c8c0b0 50%,#b0a898 100%)}
.bg-lab-ev{background:linear-gradient(180deg,#3a3040 0%,#252030 50%,#1a1520 100%)}
.bg-night{background:linear-gradient(180deg,#0a0a20 0%,#050510 50%,#020208 100%)}
.bg-city{background:linear-gradient(180deg,#6ca6cd 0%,#9bb8cd 40%,#7a8a96 100%)}
.bg-battle{background:linear-gradient(180deg,#d4590e 0%,#993300 30%,#1a1020 70%,#0a0a12 100%)}

.s-city{position:absolute;bottom:0;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:4px;padding:0 10px;transition:opacity 1s}
.s-city::after{content:'';position:absolute;bottom:0;left:0;right:0;height:6px;background:linear-gradient(180deg,#445,#334);z-index:1}
.s-city div{border-radius:2px 2px 0 0;background:#556;transition:background 1s;background-image:repeating-linear-gradient(0deg,transparent,transparent 7px,rgba(255,220,80,0.12) 7px,rgba(255,220,80,0.12) 9px),repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(255,220,80,0.12) 5px,rgba(255,220,80,0.12) 7px)}
.bg-sunset .s-city div,.bg-battle .s-city div{background:#111;background-image:repeating-linear-gradient(0deg,transparent,transparent 7px,rgba(255,200,50,0.04) 7px,rgba(255,200,50,0.04) 9px),repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(255,200,50,0.04) 5px,rgba(255,200,50,0.04) 7px)}
.bg-night .s-city div{background:#0a0a12;background-image:repeating-linear-gradient(0deg,transparent,transparent 7px,rgba(255,200,50,0.06) 7px,rgba(255,200,50,0.06) 9px),repeating-linear-gradient(90deg,transparent,transparent 5px,rgba(255,200,50,0.06) 5px,rgba(255,200,50,0.06) 7px)}
.bg-night .s-city::after{background:linear-gradient(180deg,#111,#0a0a12)}
.bg-city .s-city::after{background:linear-gradient(180deg,#667,#556)}
.bg-lab .s-city,.bg-lab-ev .s-city{display:none}
.scene-bg.bg-night::before{content:'';position:absolute;top:0;left:0;right:0;height:55%;z-index:0;background-image:radial-gradient(1.5px 1.5px at 25px 35px,rgba(255,255,255,0.7),transparent),radial-gradient(1px 1px at 85px 55px,rgba(255,255,255,0.5),transparent),radial-gradient(1.5px 1.5px at 145px 25px,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 205px 70px,rgba(255,255,255,0.4),transparent),radial-gradient(1px 1px at 265px 40px,rgba(255,255,255,0.5),transparent),radial-gradient(1.5px 1.5px at 325px 60px,rgba(255,255,255,0.6),transparent),radial-gradient(1px 1px at 55px 75px,rgba(255,255,255,0.3),transparent),radial-gradient(1px 1px at 175px 85px,rgba(255,255,255,0.4),transparent),radial-gradient(1.5px 1.5px at 365px 30px,rgba(255,255,255,0.5),transparent),radial-gradient(1px 1px at 115px 50px,rgba(255,255,255,0.3),transparent);animation:twinkle 4s ease-in-out infinite alternate}
.scene-bg.bg-sky::before,.scene-bg.bg-city::before{content:'';position:absolute;top:12%;left:8%;width:50px;height:16px;background:rgba(255,255,255,0.25);border-radius:16px;box-shadow:70px -8px 0 8px rgba(255,255,255,0.18),180px 5px 0 4px rgba(255,255,255,0.12);z-index:0}
@keyframes twinkle{0%{opacity:0.5}100%{opacity:1}}

.lab-bg{position:absolute;bottom:0;left:0;right:0;top:0;display:none}
.bg-lab .lab-bg,.bg-lab-ev .lab-bg{display:block}
.lab-wall{position:absolute;bottom:0;left:0;right:0;height:70%;border-top:2px solid rgba(255,255,255,0.05)}
.bg-lab .lab-wall{background:linear-gradient(180deg,#d5cfc5,#c0b8a8);background-image:repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(0,0,0,0.03) 50px,rgba(0,0,0,0.03) 51px)}
.bg-lab-ev .lab-wall{background:linear-gradient(180deg,#2a2530,#201c28);background-image:repeating-linear-gradient(90deg,transparent,transparent 50px,rgba(255,255,255,0.02) 50px,rgba(255,255,255,0.02) 51px)}
.lab-light{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:100px;height:4px;border-radius:2px;opacity:0.3}
.bg-lab .lab-light{background:#fff;opacity:0.5;box-shadow:0 0 20px rgba(255,255,255,0.2)}
.bg-lab-ev .lab-light{background:#ffd700;opacity:0.15;box-shadow:0 0 15px rgba(255,215,0,0.1)}
.lab-bg::after{content:'';position:absolute;bottom:25%;right:15px;width:30px;height:45px;border:1px solid rgba(0,0,0,0.08);border-radius:2px}
.bg-lab-ev .lab-bg::after{border-color:rgba(255,255,255,0.05)}
.lab-bg::before{content:'';position:absolute;bottom:30%;left:12px;width:20px;height:60px;border:1px solid rgba(0,0,0,0.06);border-radius:2px}
.bg-lab-ev .lab-bg::before{border-color:rgba(255,255,255,0.04)}

.s-chars{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;align-items:flex-end;gap:12px;padding:0 20px;transition:all 0.5s}
.s-chars.ch-left{justify-content:flex-start;padding-left:30px}
.s-chars.ch-right{justify-content:flex-end;padding-right:30px}
.s-chars.ch-spread{justify-content:space-around}
.s-chars.ch-sides{justify-content:space-between;padding:0 30px}

.rw{transition:all 0.4s;filter:drop-shadow(0 4px 12px rgba(0,0,0,0.5))}
.rw.dim{opacity:0.3;filter:grayscale(0.6) drop-shadow(0 2px 6px rgba(0,0,0,0.3))}
.rw.talk{transform:scale(1.12);filter:drop-shadow(0 4px 20px rgba(255,255,255,0.2)) drop-shadow(0 0 12px rgba(255,215,0,0.15))}
.rw.enter{animation:enterUp 0.5s ease}

.scene-cg{position:absolute;top:0;left:0;right:0;bottom:0;z-index:8;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.35);cursor:pointer;animation:cgFadeIn 0.8s ease}
.scene-cg img{max-width:92%;max-height:55%;border-radius:8px;box-shadow:0 6px 32px rgba(0,0,0,0.5);object-fit:contain;animation:cgZoom 0.8s ease}
.scene-cg .cg-hint{position:absolute;bottom:12px;right:16px;font-family:'Do Hyeon',sans-serif;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:2px;animation:blink 1.5s ease-in-out infinite}
@keyframes cgFadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes cgZoom{0%{transform:scale(0.92);opacity:0}100%{transform:scale(1);opacity:1}}
.sfx-area{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:5;pointer-events:none}
.sfx-t{font-family:'Do Hyeon',sans-serif;font-size:78px;color:#e53935;text-shadow:5px 5px 0 #ffd600,10px 10px 0 #ff9800,15px 15px 0 rgba(0,0,0,0.1);transform:skewX(-7deg) rotate(-2deg);animation:sfxPop 0.5s cubic-bezier(0.34,1.56,0.64,1);-webkit-text-stroke:1px #b71c1c;paint-order:stroke fill;filter:drop-shadow(0 0 10px rgba(229,57,53,0.3))}
.sfx-t.dark{color:#c62828;text-shadow:3px 3px 0 #000,0 0 40px rgba(198,40,40,0.5);font-size:56px;transform:skewX(-5deg) rotate(0deg);-webkit-text-stroke:0;filter:none}

.drama-area{position:absolute;top:0;left:0;right:0;bottom:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:5;text-align:center;padding:20px}
.drama-line{font-family:'Noto Serif KR',serif;font-size:20px;color:#ddd;line-height:2.2;letter-spacing:3px;text-shadow:0 0 20px rgba(0,0,0,0.5);animation:dramaFadeIn 0.8s ease}
.drama-line.red{color:#e53935;text-shadow:0 0 30px rgba(229,57,53,0.5),0 0 60px rgba(229,57,53,0.2)}
.drama-line.large{font-size:30px;font-family:'Do Hyeon',sans-serif;letter-spacing:8px}
@keyframes dramaFadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.drama-line.gold{color:#ffd700;text-shadow:0 0 20px rgba(255,215,0,0.6),0 0 40px rgba(255,215,0,0.3),3px 3px 0 rgba(0,0,0,0.3)}
.drama-line.dim{color:#666}

/* DIALOG */
.dlg{background:linear-gradient(180deg,rgba(255,252,242,0.97),rgba(255,248,230,0.97));border:3px solid rgba(255,215,0,0.35);border-bottom:none;border-radius:18px 18px 0 0;padding:16px 22px 22px;min-height:185px;position:relative;cursor:pointer;transition:all 0.5s;box-shadow:0 -6px 24px rgba(255,215,0,0.12),inset 0 2px 0 rgba(255,255,255,0.8)}
.dlg.dark{background:linear-gradient(180deg,rgba(10,5,30,0.96),rgba(0,0,20,0.96));border:none;border-top:2px solid rgba(198,40,40,0.5);border-bottom:1px solid rgba(198,40,40,0.1);border-radius:0;box-shadow:inset 0 1px 0 rgba(198,40,40,0.08),0 -4px 16px rgba(0,0,0,0.3)}
.dlg.red-border{border-color:#e53935}
.d-spk{font-size:14px;font-weight:bold;margin-bottom:8px;letter-spacing:2px;text-shadow:none;display:inline-block;padding:2px 14px;border-radius:14px;background:linear-gradient(135deg,rgba(0,0,0,0.06),rgba(0,0,0,0.02))}
.d-spk:empty{display:none}
.dlg.dark .d-spk{background:none;text-shadow:0 0 8px currentColor;padding:0;display:block}
.d-txt{font-size:14px;color:#333;line-height:1.8;min-height:60px;white-space:pre-wrap;overflow-wrap:break-word;word-break:keep-all}
.d-txt.serif{font-family:'Noto Serif KR',serif;color:#555;font-size:13px}
.d-txt.center{text-align:center}
.dlg.dark .d-txt{color:#eee}
.dlg.dark .d-txt.serif{color:#ccc}
.d-next{position:absolute;bottom:8px;right:16px;font-size:14px;color:#ffd700;animation:nextBounce 1s ease-in-out infinite}
.dlg.dark .d-next{color:#555;font-size:12px;animation:blink 1.2s ease-in-out infinite}
@keyframes nextBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}

.ch-area{display:none;flex-direction:column;gap:7px;margin-top:8px}
.ch-btn{display:block;width:100%;padding:11px 16px;background:rgba(255,215,0,0.06);border:2px solid rgba(255,215,0,0.25);border-radius:12px;color:#333;font-size:14px;font-family:'Gowun Dodum',sans-serif;text-align:left;cursor:pointer;transition:all 0.2s;overflow-wrap:break-word;word-break:keep-all}
.ch-btn:hover{background:rgba(255,215,0,0.15);transform:translateX(6px) scale(1.02);border-color:#ffd700;box-shadow:0 2px 8px rgba(255,215,0,0.2)}
.ch-btn.picked{background:rgba(229,57,53,0.1);border-color:#e53935;color:#c62828}
.dlg.dark .ch-btn{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.12);color:#eee}
.dlg.dark .ch-btn:hover{background:rgba(255,255,255,0.08);transform:translateX(6px);border-color:rgba(255,255,255,0.25);box-shadow:none}
.dlg.dark .ch-btn.picked{background:rgba(229,57,53,0.15);border-color:#e53935;color:#fff}

/* CHAPTER CARD */
.ch-card{position:absolute;top:0;left:0;right:0;bottom:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;pointer-events:none;transition:opacity 0.8s}
.ch-card.on{opacity:1;pointer-events:auto}
.ch-num{font-family:'Do Hyeon',sans-serif;font-size:15px;color:#ffd700;letter-spacing:8px;text-shadow:0 0 12px rgba(255,215,0,0.3)}
.ch-title{font-family:'Do Hyeon',sans-serif;font-size:28px;color:#fff;margin-top:12px;letter-spacing:5px;text-shadow:0 0 24px rgba(255,255,255,0.2)}
.ch-title.red{color:#e53935;text-shadow:0 0 24px rgba(229,57,53,0.4)}

/* ENDING */
#ending-screen{background:#050505;align-items:center;justify-content:center;text-align:center;padding:40px}
#ending-screen>*{opacity:0}
#ending-screen.end-show>#endQ{animation:endFadeIn 1.5s ease 0.8s forwards}
#ending-screen.end-show>.end-title{animation:endFadeIn 1.5s ease 2s forwards}
#ending-screen.end-show>.end-coming{animation:endFadeIn 1.5s ease 3s forwards}
#ending-screen.end-show>.end-btn{animation:endFadeIn 1.5s ease 3.8s forwards}
@keyframes endFadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
.end-line{font-family:'Noto Serif KR',serif;font-size:15px;color:#888;line-height:2.4;letter-spacing:1px}
.end-line.bright{color:#ccc}
.end-line.red{color:#e53935;font-weight:bold;font-size:17px}
.end-title{font-family:'Do Hyeon',sans-serif;font-size:24px;color:#e53935;margin-top:36px;letter-spacing:4px;text-shadow:0 0 30px rgba(229,57,53,0.3)}
.end-coming{font-size:12px;color:#444;margin-top:20px;letter-spacing:3px}
.end-btn{margin-top:20px;padding:9px 24px;border:1px solid #333;background:none;color:#666;font-size:13px;font-family:'Gowun Dodum',sans-serif;border-radius:6px;cursor:pointer}
.end-btn:hover{border-color:#666;color:#aaa}

/* FX */
.fl{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:20;opacity:0}
.fl.white{background:#fff;animation:flAnim 0.3s ease}
.fl.red{background:#e53935;animation:flAnim 0.5s ease}
.fl.black{background:#000;animation:flSlow 1.8s ease}
.shake-fx{animation:shake 0.4s ease;animation-fill-mode:none !important}

.aff-pop{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;font-family:'Gowun Dodum',sans-serif;font-size:15px;padding:12px 28px;border-radius:24px;pointer-events:none;animation:affAnim 1.8s ease forwards;opacity:0}
.aff-pop.up{color:#e53935;background:linear-gradient(135deg,rgba(255,182,193,0.25),rgba(229,57,53,0.12));border:2px solid rgba(229,57,53,0.3);box-shadow:0 2px 16px rgba(229,57,53,0.15)}
.aff-pop.down{color:#42a5f5;background:linear-gradient(135deg,rgba(144,202,249,0.25),rgba(21,101,192,0.12));border:2px solid rgba(21,101,192,0.3);box-shadow:0 2px 16px rgba(21,101,192,0.15)}
@keyframes affAnim{0%{opacity:0;transform:translate(-50%,-50%) translateY(10px)}15%{opacity:1;transform:translate(-50%,-50%) translateY(0)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) translateY(-10px)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes shake{0%,100%{transform:translateX(0)}15%{transform:translateX(-8px) translateY(-2px)}30%{transform:translateX(8px) translateY(2px)}45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}90%{transform:translateX(3px)}}
@keyframes sfxPop{0%{transform:skewX(-10deg) scale(0.2) rotate(-8deg);opacity:0}35%{transform:skewX(-7deg) scale(1.4) rotate(3deg);opacity:1}60%{transform:skewX(-7deg) scale(0.9) rotate(-2deg)}80%{transform:skewX(-7deg) scale(1.05) rotate(1deg)}100%{transform:skewX(-7deg) scale(1) rotate(-2deg);opacity:1}}
@keyframes flAnim{0%{opacity:0.8}100%{opacity:0}}
@keyframes flSlow{0%{opacity:1}50%{opacity:1}100%{opacity:0}}
@keyframes enterUp{0%{transform:translateY(30px) scale(0.8);opacity:0}50%{transform:translateY(-5px) scale(1.05);opacity:1}75%{transform:translateY(3px) scale(0.98)}100%{transform:translateY(0) scale(1);opacity:1}}

/* BATTLE HUD */
.b-hud{position:absolute;top:0;left:0;right:0;padding:14px 16px 10px;background:linear-gradient(180deg,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.4) 70%,transparent);z-index:4;display:none;transition:opacity 0.5s}
.b-hud.on{display:block}
.b-en{font-family:'Do Hyeon',sans-serif;font-size:15px;color:#ce93d8;text-align:center;margin-bottom:6px;letter-spacing:2px}
.b-bar{height:10px;background:#222;border-radius:5px;overflow:hidden;margin:0 30px;border:1px solid #444}
.b-fill{height:100%;border-radius:4px;transition:width 0.8s ease}
.b-fill.enemy{background:linear-gradient(90deg,#b71c1c,#e53935)}
.b-fill.team{background:linear-gradient(90deg,#1b5e20,#4ecca3)}
.b-lbl{font-family:'Do Hyeon',sans-serif;font-size:11px;color:#888;text-align:center;margin-top:2px;letter-spacing:1px}
.b-turn{font-family:'Do Hyeon',sans-serif;font-size:12px;color:#ffd700;text-align:center;margin-top:6px;letter-spacing:3px}
.b-team-bot{display:none;padding:8px 16px;background:rgba(0,10,20,0.95);border-top:2px solid #4ecca3;border-bottom:1px solid rgba(255,255,255,0.05)}
.b-team-bot.on{display:block}
.b-team-bot.boost{border-top-color:#ffd700;background:rgba(20,15,0,0.95)}
.b-fill.team.boost{background:linear-gradient(90deg,#f57c00,#ffd700);box-shadow:0 0 12px rgba(255,215,0,0.6);animation:boostPulse 1.5s ease infinite}
@keyframes boostPulse{0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.4)}50%{box-shadow:0 0 20px rgba(255,215,0,0.8)}}
.fl.gold{background:linear-gradient(135deg,#ffd700,#ff8c00);animation:flAnim 0.5s ease}

/* TITLE BUTTONS */
.t-btns{display:flex;flex-direction:column;gap:10px;margin-top:50px;z-index:1;align-items:center}
.t-start.t-story{background:rgba(229,57,53,0.2);border:2px solid rgba(229,57,53,0.6);color:#ff6b6b;font-size:17px;letter-spacing:5px}
.t-start.t-story:hover{background:rgba(229,57,53,0.35);border-color:#e53935;transform:scale(1.05);box-shadow:0 0 16px rgba(229,57,53,0.3)}
.t-battle{background:rgba(255,215,0,0.12)!important;border:2px solid rgba(255,215,0,0.4)!important;color:#ffd700!important;font-size:15px!important;letter-spacing:3px}
.t-battle:hover{background:rgba(255,215,0,0.25)!important;border-color:#ffd700!important;transform:scale(1.05);box-shadow:0 0 16px rgba(255,215,0,0.3)}
.t-best{font-size:11px;color:#666;margin-top:14px;z-index:1;font-family:'Do Hyeon',sans-serif;letter-spacing:1px}

/* SELECT SCREEN */
#select-screen{background:linear-gradient(180deg,#1a1a2e 0%,#0a0a14 100%);align-items:center;justify-content:flex-start;padding:30px 16px;overflow-y:auto}
.sel-bg{width:100%;display:flex;flex-direction:column;align-items:center}
.sel-title{font-family:'Do Hyeon',sans-serif;font-size:18px;color:#ffd700;letter-spacing:3px;margin-bottom:20px}
.sel-cards{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.sel-card{background:rgba(255,255,255,0.04);border:2px solid #333;border-radius:10px;padding:10px 8px;width:72px;text-align:center;cursor:pointer;transition:all 0.3s}

/* BATTLE SCREEN */
#battle-screen{background:#0a0a14}

.bt-wave{font-family:'Do Hyeon',sans-serif;font-size:13px;color:#ffd700;text-align:center;padding:10px 0 4px;letter-spacing:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt-cycle{font-size:10px;color:#666;letter-spacing:1px;margin-left:4px}
.bt-ehud{padding:4px 24px 8px}
.bt-ename{font-family:'Do Hyeon',sans-serif;font-size:14px;color:#ce93d8;text-align:center;letter-spacing:2px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt-ebar-wrap{height:10px;background:#1a1a2e;border-radius:5px;overflow:hidden;border:1px solid #444}
.bt-ebar{height:100%;background:linear-gradient(90deg,#b71c1c,#e53935);border-radius:4px;transition:width 0.5s ease}
.bt-ehp{font-family:'Do Hyeon',sans-serif;font-size:10px;color:#888;text-align:center;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bt-field{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;position:relative;min-height:200px}
.bt-enemy-svg{transition:all 0.3s;animation:enemyEnter 0.6s ease}
.bt-enemy-svg.boss{animation:bossEnter 1.2s cubic-bezier(0.34,1.56,0.64,1);filter:drop-shadow(0 0 20px var(--boss-glow,#7b1fa2)) drop-shadow(0 0 40px var(--boss-glow,#7b1fa2))}
.bt-player-svg{transition:all 0.3s;animation:playerEnter 0.5s ease}
.bt-enemy-svg.dead{opacity:0;transform:scale(0.3);transition:all 0.6s ease}
.bt-player-svg.dead{opacity:0;transform:translateY(20px);transition:all 0.6s ease}
.bt-edesc{font-family:'Gowun Dodum',sans-serif;font-size:10px;color:#666;text-align:center;margin-top:-2px;margin-bottom:2px}
.bt-phud{padding:6px 20px}
.bt-pbar-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.bt-plbl{font-family:'Do Hyeon',sans-serif;font-size:11px;width:22px;letter-spacing:1px;color:#888}
.bt-pbar-row:first-child .bt-plbl{color:#ff6b6b}
.bt-pbar-row:nth-child(2) .bt-plbl{color:#64b5f6}
.bt-pbar-wrap{flex:1;height:10px;background:#1a1a2e;border-radius:5px;overflow:hidden;border:1px solid #333}
.bt-pbar{height:100%;border-radius:4px;transition:width 0.5s ease}
.bt-pbar.hp{background:linear-gradient(90deg,#1b5e20,#4ecca3);box-shadow:0 0 6px rgba(78,204,163,0.4)}
.bt-pbar.shield{background:linear-gradient(90deg,#e0a500,#ffd740);position:absolute;top:0;right:0;opacity:0.85}
.bt-pbar-wrap{position:relative}
.bt-pbar.sp{background:linear-gradient(90deg,#1565c0,#42a5f5)}
.bt-pval{font-family:'Do Hyeon',sans-serif;font-size:10px;color:#888;min-width:60px;text-align:right;white-space:nowrap}
.bt-acts{padding:6px 12px 4px;display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.bt-act{font-family:'Do Hyeon',sans-serif;font-size:11px;color:#fff;padding:7px 8px;background:rgba(255,255,255,0.06);border:2px solid #444;border-radius:8px;cursor:pointer;transition:all 0.15s;text-align:center;letter-spacing:0.5px;overflow-wrap:break-word;word-break:keep-all;line-height:1.4}
.bt-act:hover{transform:translateY(-2px)}
.bt-act:active{transform:translateY(0);opacity:0.8}
.bt-act.atk{border-color:rgba(229,57,53,0.6);color:#ff6b6b;background:linear-gradient(135deg,rgba(229,57,53,0.15),rgba(229,57,53,0.05))}
.bt-act.atk:hover{background:linear-gradient(135deg,rgba(229,57,53,0.3),rgba(229,57,53,0.1));border-color:#e53935;box-shadow:0 0 12px rgba(229,57,53,0.3),inset 0 0 8px rgba(229,57,53,0.1)}
.bt-act.def{border-color:rgba(100,181,246,0.6);color:#64b5f6;background:linear-gradient(135deg,rgba(100,181,246,0.12),rgba(100,181,246,0.04))}
.bt-act.def:hover{background:linear-gradient(135deg,rgba(100,181,246,0.25),rgba(100,181,246,0.08));border-color:#64b5f6;box-shadow:0 0 12px rgba(100,181,246,0.3),inset 0 0 8px rgba(100,181,246,0.1)}
.bt-act.skill{border-color:rgba(255,215,0,0.6);color:#ffd700;background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,215,0,0.04))}
.bt-act.skill:hover{background:linear-gradient(135deg,rgba(255,215,0,0.25),rgba(255,215,0,0.08));border-color:#ffd700;box-shadow:0 0 12px rgba(255,215,0,0.3),inset 0 0 8px rgba(255,215,0,0.1)}
.bt-act.support{border-color:rgba(78,204,163,0.6);color:#4ecca3;background:linear-gradient(135deg,rgba(78,204,163,0.12),rgba(78,204,163,0.04))}
.bt-act.support:hover{background:linear-gradient(135deg,rgba(78,204,163,0.25),rgba(78,204,163,0.08));border-color:#4ecca3;box-shadow:0 0 12px rgba(78,204,163,0.3),inset 0 0 8px rgba(78,204,163,0.1)}
.bt-act.disabled{opacity:0.3;pointer-events:none;box-shadow:none}
.bt-log{font-family:'Gowun Dodum',sans-serif;font-size:11px;color:#888;text-align:left;padding:4px 12px 8px;min-height:56px;max-height:80px;overflow-y:auto;overflow-x:hidden;line-height:1.6;scrollbar-width:thin;scrollbar-color:#333 transparent;overflow-wrap:break-word;word-break:keep-all}
.bt-log::-webkit-scrollbar{width:3px}
.bt-log::-webkit-scrollbar-thumb{background:#444;border-radius:2px}
.bt-log .bt-log-entry{padding:1px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.bt-log .bt-log-entry:last-child{border-bottom:none}
.bt-log .bt-turn-num{color:#555;font-family:'Do Hyeon',sans-serif;margin-right:4px}
.bt-log .dmg{color:#ff6b6b;font-weight:bold}
.bt-log .heal{color:#4ecca3;font-weight:bold}
.bt-log .sp-use{color:#64b5f6}
.bt-log .buff{color:#ffd700}
.bt-log .gold-drop{color:#ffd700;font-weight:bold}
.bt-log .detail{color:#666;font-size:10px}
.bt-fx{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:20;opacity:0}
.bt-drama{position:absolute;top:0;left:0;right:0;bottom:0;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:15;background:rgba(0,0,0,0.7)}
.bt-drama.on{display:flex}
.bt-drama-line{font-family:'Do Hyeon',sans-serif;font-size:32px;color:#ffd700;letter-spacing:6px;text-shadow:0 0 20px rgba(255,215,0,0.6),0 0 40px rgba(255,215,0,0.3),3px 3px 0 #c62828,-3px -3px 0 #000;animation:dramaPop 0.7s cubic-bezier(0.34,1.56,0.64,1)}
.bt-drama-line.boss{font-size:38px;text-shadow:0 0 30px rgba(255,0,0,0.7),0 0 60px rgba(255,0,0,0.3),4px 4px 0 #000;animation:dramaPop 1s cubic-bezier(0.34,1.56,0.64,1)}
.bt-drama-line.victory{font-size:42px;color:#ffd700;text-shadow:0 0 30px rgba(255,215,0,0.8),0 0 60px rgba(255,215,0,0.4),3px 3px 0 #e53935;animation:victoryPop 1s cubic-bezier(0.34,1.56,0.64,1)}
@keyframes dramaPop{0%{transform:scale(0.3) rotate(-10deg);opacity:0}50%{transform:scale(1.3) rotate(3deg);opacity:1}75%{transform:scale(0.9) rotate(-1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
@keyframes victoryPop{0%{transform:scale(0) rotate(-20deg);opacity:0}40%{transform:scale(1.5) rotate(5deg);opacity:1}60%{transform:scale(0.85) rotate(-2deg)}80%{transform:scale(1.1) rotate(1deg)}100%{transform:scale(1) rotate(0deg);opacity:1}}
.bt-dmg-num{position:absolute;font-family:'Do Hyeon',sans-serif;font-size:30px;color:#ff6b6b;text-shadow:2px 2px 0 #000,-1px -1px 0 #000;z-index:16;animation:dmgFloat 1.2s ease forwards;pointer-events:none}
.bt-dmg-num.heal{color:#4ecca3;text-shadow:2px 2px 0 #000,0 0 8px rgba(78,204,163,0.5)}
.bt-dmg-num.crit{font-size:42px;color:#ffd700;text-shadow:3px 3px 0 #c62828,0 0 16px rgba(255,215,0,0.6);animation:critFloat 1.2s ease forwards}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}30%{transform:translateY(-15px) scale(1.1)}100%{opacity:0;transform:translateY(-50px) scale(0.8)}}
@keyframes critFloat{0%{opacity:1;transform:translateY(0) scale(0.5) rotate(-10deg)}20%{transform:translateY(-10px) scale(1.4) rotate(5deg);opacity:1}50%{transform:translateY(-25px) scale(1) rotate(0deg)}100%{opacity:0;transform:translateY(-60px) scale(0.7)}}
@keyframes enemyEnter{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.15);opacity:1}75%{transform:scale(0.95)}100%{transform:scale(1)}}
@keyframes bossEnter{0%{transform:scale(0) rotate(-10deg);opacity:0}30%{transform:scale(1.8) rotate(5deg);opacity:1}55%{transform:scale(0.8) rotate(-3deg)}75%{transform:scale(1.1) rotate(1deg)}100%{transform:scale(1) rotate(0deg)}}
@keyframes playerEnter{0%{transform:translateX(-50px) scale(0.8);opacity:0}60%{transform:translateX(5px) scale(1.05);opacity:1}100%{transform:translateX(0) scale(1)}}
@keyframes goFadeIn{0%{opacity:0;transform:translateY(10px)}100%{opacity:1;transform:translateY(0)}}
@keyframes btShake{0%,100%{transform:translateX(0)}12%{transform:translateX(-8px) translateY(-2px)}25%{transform:translateX(8px) translateY(2px)}37%{transform:translateX(-6px)}50%{transform:translateX(6px)}62%{transform:translateX(-4px)}75%{transform:translateX(4px)}87%{transform:translateX(-2px)}}
@keyframes btFlash{0%{opacity:0.7}30%{opacity:0.3}50%{opacity:0.6}100%{opacity:0}}
@keyframes confetti{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(300px) rotate(720deg);opacity:0}}
.bt-preview{font-family:'Gowun Dodum',sans-serif;font-size:10px;color:#aaa;text-align:center;padding:2px 12px 6px;min-height:16px;line-height:1.5;transition:all 0.2s}

.bt-preview .pv-heal{color:#4ecca3;font-weight:bold}

.tut-overlay{position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);cursor:pointer;animation:rewardFadeIn 0.3s ease}
.tut-box{background:linear-gradient(180deg,rgba(20,10,40,0.98),rgba(10,5,20,0.98));border:2px solid #ffd700;border-radius:14px;padding:24px 20px;max-width:340px;width:90%;text-align:center;box-shadow:0 0 30px rgba(255,215,0,0.15)}
.tut-step{font-family:'Do Hyeon',sans-serif;font-size:11px;color:#ffd700;letter-spacing:3px;margin-bottom:8px}
.tut-title{font-family:'Do Hyeon',sans-serif;font-size:20px;color:#fff;letter-spacing:2px;margin-bottom:12px;text-shadow:0 0 12px rgba(255,215,0,0.3)}
.tut-desc{font-family:'Gowun Dodum',sans-serif;font-size:13px;color:#ccc;line-height:1.8;margin-bottom:16px;word-break:keep-all}
.tut-hint{font-family:'Do Hyeon',sans-serif;font-size:11px;color:#666;letter-spacing:1px;animation:blink 1.5s ease-in-out infinite}
.bt-status{display:flex;gap:4px;justify-content:center;margin-top:2px}

/* REWARD SCREEN */
#reward-screen{background:linear-gradient(180deg,#1a1020 0%,#0a0a14 100%);align-items:center;justify-content:center;text-align:center;padding:30px}
.rw-bg{display:flex;flex-direction:column;align-items:center;animation:rewardFadeIn 0.6s ease}
.rw-title{font-family:'Do Hyeon',sans-serif;font-size:26px;color:#ffd700;letter-spacing:6px;margin-bottom:6px;text-shadow:0 0 20px rgba(255,215,0,0.5),0 0 40px rgba(255,215,0,0.2),2px 2px 0 #c62828}

.rw-icon{font-size:32px;margin-bottom:8px}
.rw-rname{font-family:'Do Hyeon',sans-serif;font-size:13px;color:#fff;letter-spacing:1px;overflow-wrap:break-word;word-break:keep-all}
.rw-rdesc{font-family:'Gowun Dodum',sans-serif;font-size:11px;color:#888;margin-top:6px;overflow-wrap:break-word;word-break:keep-all}
.rw-card.rare{border-color:#ffd700;background:linear-gradient(180deg,rgba(255,215,0,0.10),rgba(255,215,0,0.03));box-shadow:0 0 12px rgba(255,215,0,0.15)}
.rw-card.rare .rw-rname{color:#ffd700}
.rw-tier{font-family:'Do Hyeon',sans-serif;font-size:10px;letter-spacing:2px;margin-bottom:4px}

@keyframes rewardFadeIn{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
.mini-rw{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;z-index:22;background:rgba(0,0,0,0.7);animation:rewardFadeIn 0.4s ease}

.go-bg{display:flex;flex-direction:column;align-items:center}

<script>
/* ===== 화면 스케일링 ===== */
function resizeGame(){
  var g=document.getElementById('game');
  var s=Math.min(window.innerHeight/740,window.innerWidth/440)*0.98;
  if(s>1)g.style.transform='scale('+s+')';
  else g.style.transform='';
}
window.addEventListener('resize',resizeGame);resizeGame();

/* ===== BGM ===== */
var masterVol=parseFloat(localStorage.getItem('mr_vol')||'0.5');
var bgmDaily=new Audio('일상.mp3');bgmDaily.loop=true;
var bgmBattle=new Audio('전투.mp3');bgmBattle.loop=false;
var bgmBattle2=new Audio('두번째 전투.mp3');bgmBattle2.loop=true;
var bgmBaseVol={daily:0.4,battle:0.5,battle2:0.5};
function applyVol(a,base){a.volume=Math.min(1,base*masterVol/0.5)}
var curBgm=null,bgmTimer=null;
function playBgm(which){
  if(curBgm===which)return;
  if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null}
  fadeBgm(bgmDaily);fadeBgm(bgmBattle);fadeBgm(bgmBattle2);
  curBgm=which;
  if(which==='daily'){bgmDaily.currentTime=0;applyVol(bgmDaily,bgmBaseVol.daily);bgmDaily.play().catch(function(){});}
  else if(which==='battle'){
    bgmBattle.currentTime=0;applyVol(bgmBattle,bgmBaseVol.battle);bgmBattle.play().catch(function(){});
    bgmTimer=setTimeout(function(){fadeBgm(bgmBattle);curBgm=null},90000);
  }
  else if(which==='battle2'){
    bgmBattle2.currentTime=0;applyVol(bgmBattle2,bgmBaseVol.battle2);bgmBattle2.play().catch(function(){});
  }
}
// 일시정지 메뉴 & 볼륨
var gamePaused=false;
(function(){
  var slider=$('vol-slider');var btn=$('vol-btn');var label=$('vol-label');
  var overlay=$('pause-overlay');var pauseBtn=$('pause-btn');
  function updateVolUI(){
    slider.value=Math.round(masterVol*100);
    label.textContent=Math.round(masterVol*100)+'%';
    btn.textContent=masterVol<=0?'🔇':masterVol<0.3?'🔈':'🔊';
  }
  updateVolUI();
  function applyAllVol(){
    [bgmDaily,bgmBattle,bgmBattle2].forEach(function(a){if(!a.paused){var base=a===bgmDaily?bgmBaseVol.daily:a===bgmBattle?bgmBaseVol.battle:bgmBaseVol.battle2;applyVol(a,base)}});
  }
  slider.addEventListener('input',function(){
    masterVol=parseInt(this.value)/100;
    localStorage.setItem('mr_vol',String(masterVol));
    updateVolUI();applyAllVol();
  });
  btn.addEventListener('click',function(){
    if(masterVol>0){masterVol=0}else{masterVol=0.5}
    localStorage.setItem('mr_vol',String(masterVol));
    updateVolUI();applyAllVol();
  });
  function openPause(){
    gamePaused=true;overlay.classList.add('on');
    // 전투 중이면 훈련 종료 보이기
    var inBattle=$('battle-screen').classList.contains('active');
    $('pause-retreat').style.display=inBattle?'block':'none';
  }
  function closePause(){
    gamePaused=false;overlay.classList.remove('on');
  }
  pauseBtn.addEventListener('click',openPause);
  $('pause-resume').addEventListener('click',closePause);
  $('pause-title-btn').addEventListener('click',function(){
    closePause();stopAllBgm();showScr('title');
  });
  $('pause-retreat').addEventListener('click',function(){
    closePause();retreatBattle();
  });
  // ESC 키로 일시정지 토글
  document.addEventListener('keydown',function(e){
    if(e.key==='Escape'){
      if(gamePaused)closePause();
      else{
        var cur=document.querySelector('.screen.active');
        if(cur&&(cur.id==='battle-screen'||cur.id==='scene-screen'))openPause();
      }
    }
  });
})()
var fadeTimers=[];
function fadeBgm(a,target){
  if(a.paused)return;
  var to=target||0;
  var v=a.volume,iv=setInterval(function(){v-=0.05;if(v<=to+0.01){if(to<=0){a.pause();a.volume=0}else{a.volume=to}clearInterval(iv)}else{a.volume=Math.max(0,v)}},50);
  fadeTimers.push(iv);
}
function lowerBgm(){
  if(!bgmBattle2.paused)fadeBgm(bgmBattle2,0.15*masterVol/0.5);
}
function restoreBgm(){
  if(!bgmBattle2.paused){
    var to=Math.min(1,bgmBaseVol.battle2*masterVol/0.5);
    var v=bgmBattle2.volume,iv=setInterval(function(){v+=0.05;if(v>=to-0.01){bgmBattle2.volume=to;clearInterval(iv)}else{bgmBattle2.volume=Math.min(1,v)}},50);
    fadeTimers.push(iv);curBgm='battle2';
  } else playBgm('battle2');
}
function stopAllBgm(){fadeTimers.forEach(clearInterval);fadeTimers=[];fadeBgm(bgmDaily);fadeBgm(bgmBattle);fadeBgm(bgmBattle2);curBgm=null;if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null}}

var NS='http://www.w3.org/2000/svg';
var RC={red:{m:'#e53935',d:'#c62828',l:'#ef5350'},black:{m:'#555',d:'#333',l:'#777'},blue:{m:'#1565c0',d:'#0d47a1',l:'#42a5f5'},yellow:{m:'#f9a825',d:'#f57f17',l:'#fdd835'},pink:{m:'#ec407a',d:'#c2185b',l:'#f48fb1'}};
var VP={red:'M14,24 L23,17 L30,22 L37,17 L46,24 L43,34 L17,34Z',black:'M13,23 L24,15 L30,20 L36,15 L47,23 L44,35 L16,35Z',blue:'M15,25 L24,19 L30,23 L36,19 L45,25 L43,33 L17,33Z',yellow:'M12,22 L23,16 L30,21 L37,16 L48,22 L45,34 L15,34Z',pink:'M15,24 L24,18 L30,23 L36,18 L45,24 L43,33 L17,33Z'};
function se(tag,a){var e=document.createElementNS(NS,tag);if(a)Object.keys(a).forEach(function(k){e.setAttribute(k,a[k])});return e}
function mkR(t,sc){
  sc=sc||1;var c=RC[t],w=Math.round(60*sc),h=Math.round(100*sc);
  var s=se('svg',{viewBox:'0 0 60 100',width:''+w,height:''+h});

var idx=0,flags={},busy=false;
var bSt={eH:0,eM:0,tH:0,tM:0};
function $(i){return document.getElementById(i)}
function clr(e){while(e.firstChild)e.removeChild(e.firstChild)}
function txEl(tag,cls,txt){var e=document.createElement(tag);if(cls)e.className=cls;e.textContent=txt;return e}
function showScr(id){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active')});$(id+'-screen').classList.add('active');
  // 일시정지 버튼은 전투/스토리에서만 표시
  var pb=$('pause-btn');if(pb)pb.style.display=(id==='battle'||id==='scene')?'flex':'none';
  // 일시정지 닫기
  gamePaused=false;var po=$('pause-overlay');if(po)po.classList.remove('on');
}

function run(){
  if(idx>=S.length)return;
  var s=S[idx];
  if(s.if){var k=Object.keys(s.if)[0];if(flags[k]!==s.if[k]){idx++;run();return}}
  busy=true;
  var tp=s.t;
  if(tp==='ch')doChapter(s);
  else if(tp==='bg'){$('sbg').className='scene-bg bg-'+s.v;var dk=s.v==='night'||s.v==='battle'||s.v==='lab-ev';$('dlg').classList.toggle('dark',dk);if(s.v==='battle')playBgm('battle');else if(s.v==='night')stopAllBgm();else if(curBgm!=='daily')playBgm('daily');idx++;run()}
  else if(tp==='border'){$('dlg').classList.toggle('red-border',s.v==='red');idx++;run()}
  else if(tp==='img')doImg(s);
  else if(tp==='sfx')doSfx(s);
  else if(tp==='n')doNarr(s);
  else if(tp==='d')doDialog(s);
  else if(tp==='q')doChoice(s);
  else if(tp==='pause')doPause(s);
  else if(tp==='fx')doFx(s);
  else if(tp==='drama')doDrama(s);
  else if(tp==='bs')doBs(s);
  else if(tp==='bh')doBh(s);
  else if(tp==='be')doBe();
  else if(tp==='aff')doAff(s);
  else if(tp==='bgm'){playBgm(s.v);idx++;run()}
  else if(tp==='boost'){$('btf').classList.add('boost');$('bthud').classList.add('boost');idx++;run()}
  else if(tp==='end')doEnd();
}
function next(){if(busy)return;idx++;run()}

function doChapter(s){
  var c=$('chCard');clr(c);
  if(s.n)c.appendChild(txEl('div','ch-num',s.n));
  if(s.tt)c.appendChild(txEl('div','ch-title',s.tt));
  c.classList.add('on');
  chapterTimer=setTimeout(function(){chapterTimer=null;c.classList.remove('on');idx++;busy=false;run()},2200);
  c.onclick=function(){if(chapterTimer){skipChapter();c.onclick=null}};
}
function doImg(s){
  showScr('scene');clr($('sfx'));hideDrama();
  var wrap=document.createElement('div');wrap.className='scene-cg';
  var img=document.createElement('img');img.src=s.src;wrap.appendChild(img);
  var hint=document.createElement('div');hint.className='cg-hint';hint.textContent='▼ 터치';wrap.appendChild(hint);
  $('sbg').appendChild(wrap);
  $('spk').textContent='';$('dtxt').textContent='';
  $('dnext').style.display='none';$('chArea').style.display='none';
  busy=true;
  wrap.addEventListener('click',function(){
    wrap.style.opacity='0';wrap.style.transition='opacity 0.5s';
    setTimeout(function(){if(wrap.parentNode)wrap.parentNode.removeChild(wrap)},500);
    busy=false;idx++;run();
  });
}
function doSfx(s){
  showScr('scene');var area=$('sfx');clr(area);hideDrama();
  var dark=$('sbg').className.indexOf('night')>-1||$('sbg').className.indexOf('battle')>-1;
  area.appendChild(txEl('div',dark?'sfx-t dark':'sfx-t',s.v));
  $('spk').textContent='';$('dtxt').textContent='';
  $('dnext').style.display='block';$('chArea').style.display='none';
  busy=false;
}
function doNarr(s){
  showScr('scene');clr($('sfx'));hideDrama();if('ch' in s)setChars(s);
  $('spk').textContent='';
  var d=$('dtxt');d.textContent=s.tx;
  d.className='d-txt'+(s.st==='center'?' center':'');
  $('dnext').style.display='block';$('chArea').style.display='none';
  busy=false;
}
function doDialog(s){
  showScr('scene');clr($('sfx'));hideDrama();setChars(s);
  $('spk').textContent='\u3010'+s.sp+'\u3011';$('spk').style.color=s.cl||'#fff';
  $('dtxt').textContent=s.tx;$('dtxt').className='d-txt';
  $('dnext').style.display='block';$('chArea').style.display='none';
  busy=false;
}
function doChoice(s){
  showScr('scene');clr($('sfx'));hideDrama();if('ch' in s)setChars(s);
  $('spk').textContent='';$('dtxt').textContent=s.tx;$('dtxt').className='d-txt';
  $('dnext').style.display='none';
  var area=$('chArea');clr(area);area.style.display='flex';
  s.opts.forEach(function(o){
    var btn=document.createElement('button');btn.className='ch-btn';btn.textContent=o.tx;
    btn.addEventListener('click',function(){
      flags[s.fl]=o.v;btn.classList.add('picked');
      area.style.display='none';$('dnext').style.display='block';
      idx++;busy=false;setTimeout(run,350);
    });
    area.appendChild(btn);
  });
}
function doPause(s){pauseTimer=setTimeout(function(){pauseTimer=null;idx++;busy=false;run()},s.ms||1000)}
function doFx(s){inlineFx(s.v);idx++;setTimeout(function(){busy=false;run()},600)}
function inlineFx(v){
  if(v.indexOf('flash-')===0){var el=$('fl');el.className='fl';void el.offsetWidth;el.classList.add(v.replace('flash-',''))}
  if(v==='shake'){var sb=$('scene-screen')||$('game').querySelector('.screen.active');if(sb){sb.classList.add('shake-fx');setTimeout(function(){sb.classList.remove('shake-fx')},500)}}
}
function doDrama(s){
  showScr('scene');clr($('sfx'));
  $('spk').textContent='';$('dtxt').textContent='';
  $('dnext').style.display='none';$('chArea').style.display='none';
  var area=$('drama');clr(area);area.style.display='flex';
  s.lines.forEach(function(l){
    var cls='drama-line';
    if(s.cls)s.cls.split(' ').forEach(function(c){if(c)cls+=' '+c});
    area.appendChild(txEl('div',cls,l));
  });
  idx++;busy=false;run();
}
function hideDrama(){$('drama').style.display='none'}
function doAff(s){
  var el=document.createElement('div');
  el.className='aff-pop '+(s.dir==='down'?'down':'up');
  el.textContent=(s.dir==='down'?'▼ ':'♥ ')+s.tx;
  $('sbg').appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el)},1900);
  idx++;busy=true;setTimeout(function(){busy=false;run()},1200);
}
function doBs(s){
  clr($('sfx'));hideDrama();
  bSt={eH:s.eHp||100,eM:s.eHp||100,tH:s.tHp||100,tM:s.tHp||100};
  $('bhud').classList.add('on');$('bthud').classList.add('on');$('btf').classList.remove('boost');$('bthud').classList.remove('boost');
  $('ben').textContent=s.en||'';updB();idx++;run();
}
function doBh(s){
  if(s.eHp!==undefined)bSt.eH=Math.max(0,s.eHp);
  if(s.tHp!==undefined)bSt.tH=Math.max(0,s.tHp);
  updB();busy=true;setTimeout(function(){busy=false;idx++;run()},600);
}
function doBe(){$('bhud').classList.remove('on');$('bthud').classList.remove('on');idx++;run()}
function updB(){
  $('bef').style.width=Math.max(0,Math.min(100,Math.round((bSt.eM>0?bSt.eH/bSt.eM:0)*100)))+'%';
  $('btf').style.width=Math.max(0,Math.min(100,Math.round((bSt.tM>0?bSt.tH/bSt.tM:0)*100)))+'%';
  $('behl').textContent=bSt.eH+' / '+bSt.eM;
  $('bthl').textContent=bSt.tH+' / '+bSt.tM;
}
function doEnd(){
  stopAllBgm();
  var es=$('ending-screen');es.classList.remove('end-show');void es.offsetWidth;
  showScr('ending');es.classList.add('end-show');
  var el=$('endQ');clr(el);
  el.appendChild(txEl('div','end-line','오늘도 도시를 지켰다.'));
  el.appendChild(txEl('div','end-line bright','내일도 지킬 것이다.'));
  el.appendChild(document.createElement('br'));
  el.appendChild(txEl('div','end-line','그게 우리의 일상이니까.'));
  el.appendChild(document.createElement('br'));
  var ep=document.createElement('div');ep.style.cssText='color:#9575cd;font-size:12px;text-align:center;margin-top:16px;letter-spacing:2px;opacity:0;animation:fadeIn 2s 3s forwards';ep.textContent='— 프리퀄 에피소드 —';
  var ep2=document.createElement('div');ep2.style.cssText='color:#666;font-size:11px;text-align:center;margin-top:6px;opacity:0;animation:fadeIn 2s 4s forwards';ep2.textContent='본편에서 이어집니다.';
  el.appendChild(ep);el.appendChild(ep2);
}

function setChars(s){
  var area=$('chars');clr(area);
  if(!s||!s.ch||!s.ch.length){area.className='s-chars';return}
  var cls='s-chars';
  if(s.lo==='left')cls+=' ch-left';
  else if(s.lo==='right')cls+=' ch-right';
  else if(s.lo==='spread')cls+=' ch-spread';
  else if(s.lo==='sides')cls+=' ch-sides';
  area.className=cls;
  var sc=s.ch.length>3?0.75:0.95;
  s.ch.forEach(function(t){
    var w=mkWrap(t,sc);
    if(s.tk&&s.tk!==t)w.classList.add('dim');
    if(s.tk&&s.tk===t)w.classList.add('talk');
    w.classList.add('enter');
    area.appendChild(w);
  });
}

$('btn-story').addEventListener('click',function(){idx=0;flags={};$('bhud').classList.remove('on');$('bthud').classList.remove('on');$('btf').classList.remove('boost');$('bthud').classList.remove('boost');stopAllBgm();playBgm('daily');showScr('scene');run()});
var lastClick=0;
var pauseTimer=null;var chapterTimer=null;
function skipPause(){if(pauseTimer){clearTimeout(pauseTimer);pauseTimer=null;idx++;busy=false;run()}}
function skipChapter(){if(chapterTimer){clearTimeout(chapterTimer);chapterTimer=null;$('chCard').classList.remove('on');idx++;busy=false;run()}}
$('dlg').addEventListener('click',function(e){
  if(gamePaused)return;
  if(e.target.classList.contains('ch-btn'))return;
  if($('chArea').style.display==='flex')return;
  var now=Date.now();if(now-lastClick<150)return;lastClick=now;
  if(pauseTimer){skipPause();return}
  if(chapterTimer){skipChapter();return}
  next();
});
$('sbg').addEventListener('click',function(e){
  if(gamePaused)return;
  if(pauseTimer){skipPause();return}
  if(chapterTimer){skipChapter();return}
});
$('btn-title').addEventListener('click',function(){stopAllBgm();showScr('title')});

var progData={mp:0,ce:0};
function loadProg(){
  progData.mp=parseInt(localStorage.getItem('mr_mp')||'0',10);
  progData.ce=parseInt(localStorage.getItem('mr_ce')||'0',10);
  var s;try{s=JSON.parse(localStorage.getItem('mr_stats')||'{}')}catch(e){s={}}
  STAT_UPGRADES.forEach(function(u){u.level=s[u.id]||0});
  var l;try{l=JSON.parse(localStorage.getItem('mr_lab')||'{}')}catch(e){l={}}
  LAB_UPGRADES.forEach(function(u){u.level=l[u.id]||0});
}
function saveProg(){
  localStorage.setItem('mr_mp',String(progData.mp));
  localStorage.setItem('mr_ce',String(progData.ce));
  var s={};STAT_UPGRADES.forEach(function(u){s[u.id]=u.level});
  localStorage.setItem('mr_stats',JSON.stringify(s));
  var l={};LAB_UPGRADES.forEach(function(u){l[u.id]=u.level});
  localStorage.setItem('mr_lab',JSON.stringify(l));
}
function getStatBonus(id){
  var u=STAT_UPGRADES.filter(function(x){return x.id===id})[0];
  return u?(u.level*u.per):0;
}
function getLabBonus(id){
  var u=LAB_UPGRADES.filter(function(x){return x.id===id})[0];
  return u?(u.level*u.per):0;
}
loadProg();

    // 타입별 장식
    if(mob.id==='blaze') g.innerHTML+='<path d="M20,14 Q25,5 30,14 Q35,5 40,14" fill="#ff6d00" opacity="0.8"/>';
    if(mob.id==='iron') g.innerHTML+='<rect x="18" y="18" width="24" height="16" rx="2" fill="rgba(255,255,255,0.15)" stroke="#999" stroke-width="1"/>';
    if(mob.id==='phantom') svg.style.opacity='0.7';

  }
  svg.appendChild(g);
  return svg;
}

// ── 적 생성 ──
function generateEnemy(wave){
  var cycle=Math.ceil(wave/3);
  var isBoss=(wave%3===0);
  var template;
  if(isBoss){
    template=BOSSES[(cycle-1)%BOSSES.length];
  } else {
    template=MOBS[Math.floor(Math.random()*MOBS.length)];
  }
  var baseHp=isBoss?(60+cycle*16):(30+cycle*10);
  var baseAtk=isBoss?(7+cycle*3):(5+cycle*2);
  var baseDef=isBoss?(3+cycle*2):(2+cycle*1);
  // 지수 스케일링 (사이클 3 이후)
  // 완만한 스케일링: 사이클 4부터 3%씩, DEF는 2%씩 (최대 +30%)
  if(cycle>3){var m=1+Math.min((cycle-3)*0.03,0.30);baseHp=Math.round(baseHp*m);baseAtk=Math.round(baseAtk*m);baseDef=Math.round(baseDef*(1+Math.min((cycle-3)*0.02,0.30)))}
  var en={
    name:template.name,id:template.id,color:template.color,bodyColor:template.bodyColor,
    hp:Math.round(baseHp*template.hpM),maxHp:Math.round(baseHp*template.hpM),
    atk:Math.round(baseAtk*template.atkM),def:Math.round(baseDef*template.defM),
    special:template.special,isBoss:isBoss,desc:template.desc,turnCount:0,
    stealthActive:false,shield:0,executeMode:false
  };
  if(en.special&&en.special.type==='shield')en.shield=(en.special.hp||0)+cycle*2;
  if(en.special&&en.special.type==='armor')en.shield=(en.special.shield||0)+cycle*1;
  return en;
}

// ── 적 특수능력 설명 ──
function getSpecialDesc(e){
  if(!e.special)return'';
  var sp=e.special;
  if(sp.type==='smash')return sp.every+'턴마다 강타';
  if(sp.type==='poison')return'독 데미지';
  if(sp.type==='double')return'2연타 가능';
  if(sp.type==='armor')return sp.every+'턴마다 방어 전환';
  if(sp.type==='rally')return sp.every+'턴마다 자가 강화';
  if(sp.type==='dodge')return'회피 가능';
  if(sp.type==='freeze')return'빙결 (공격력 감소)';
  if(sp.type==='spdrain')return'SP 흡수';
  if(sp.type==='stealth')return sp.every+'턴마다 은신';
  if(sp.type==='burn')return'공격 시 화상';
  if(sp.type==='shield')return'쉴드 보유';
  if(sp.type==='counter')return'반격 가능';
  if(sp.type==='bomb')return sp.turns+'턴 후 자폭';
  if(sp.type==='shock')return'30% 확률 SP 감소';
  return'';
}

  var spRegen=(p.spRegen||0);
  function setPv(html){pvEl.innerHTML=html}
  function clearPv(){pvEl.innerHTML=''}

  var atkPvParts=[];

  else atkPvParts.push('<span class="pv-dmg">예상 데미지 ~'+estAtk+'</span>');

  if(spRegen>0)atkPvParts.push('<span class="pv-sp">SP+'+spRegen+' 회복</span>');
  previews.atk=atkPvParts.join(' · ');
  // 방어 프리뷰
  var defSpTotal=Math.min(p.maxSp,p.sp+10)-p.sp;

  if(BT.perkGuardHeal)defPvParts.push('<span class="pv-heal">체력 +'+Math.round(p.maxHp*0.02)+' 치유</span>');
  previews.def=defPvParts.join(' · ');
  // 집중 프리뷰
  if(BT.focusCD>0)previews.focus='<span style="color:#f44">쿨타임 '+BT.focusCD+'턴 남음</span>';
  else previews.focus='<span class="pv-heal">체력 +'+focusHp+' 회복</span> · <span class="pv-sp">SP +'+focusSp+' 충전</span> · <span class="pv-buff">쿨타임 3턴</span>';
  // 필살기 프리뷰
  var sklPvParts=['<span class="pv-dmg">예상 ~'+estSkill+'</span>','<span class="pv-sp">SP '+effectiveCost+' 소모</span>'];
  if(p.skill.stun)sklPvParts.push('<span class="pv-buff">적 '+p.skill.stun+'턴 행동불가</span>');
  if(p.skill.heal)sklPvParts.push('<span class="pv-heal">쉴드 5% 부여</span>');
  if(p.skill.ignoreDef>0)sklPvParts.push('<span class="pv-buff">적 방어 '+Math.round(p.skill.ignoreDef*100)+'% 무시</span>');
  if(p.key==='yellow'&&BT.yellowMarks>=3)sklPvParts.push('<span class="pv-buff">감전 3스택 폭발! +30% 스턴</span>');
  else if(p.key==='yellow'&&BT.yellowMarks>=2)sklPvParts.push('<span class="pv-buff">감전 2스택 소모 +20%</span>');
  if(p.key==='red'&&BT.redMomentum>=5)sklPvParts.push('<span class="pv-buff">투지 MAX! 데미지 x1.5</span>');
  if(p.key==='black'&&BT.blackAim>0)sklPvParts.push('<span class="pv-buff">관통 '+BT.blackAim+'스택 소모 +'+BT.blackAim*5+'%</span>');
  if(p.sp<effectiveCost)sklPvParts.push('<span style="color:#f44">SP 부족!</span>');
  previews.skill=sklPvParts.join(' · ');

  var ocPvParts=['<span class="pv-dmg">예상 ~'+estOC+' (1.5배)</span>','<span class="pv-sp">SP '+ocCost+' 소모</span>'];
  if(p.sp<ocCost)ocPvParts.push('<span style="color:#f44">SP 부족!</span>');
  previews.overcharge=ocPvParts.join(' · ');
  // 지원 프리뷰 (각 서포터별)
  BT.supportPool.forEach(function(sp,idx){
    var sup=sp.data.support;var cd=BT.supportCDs[sp.key]||0;
    var pv=[];
    if(cd>0){pv.push('<span style="color:#f44">쿨타임 '+cd+'턴 남음</span>')}

      pv.push('<span class="pv-buff">'+sp.data.name+'</span>');
      if(sup.type==='buff')pv.push('<span class="pv-buff">아군 '+statKR(sup.stat)+' +'+Math.round(sup.val*100)+'% ('+sup.turns+'턴)</span>');

      else if(sup.type==='sp')pv.push('<span class="pv-sp">SP +'+sup.val+' 충전</span>');
      else if(sup.type==='debuff')pv.push('<span class="pv-buff">적 '+statKR(sup.stat)+' -'+Math.round(sup.val*100)+'% ('+sup.turns+'턴)</span>');
      else if(sup.type==='damage'){var es=Math.round(calcDmg(p.atk+getBuffVal('atk'),e.def+getDebuffVal('def'),sup.multi,0)*0.9);pv.push('<span class="pv-dmg">예상 ~'+es+'</span>')}
    }
    previews['sup_'+idx]=pv.join(' · ');

  // 합체기 프리뷰
  if(BT.comboAttackCharged){
    var estCombo=Math.round(calcDmg((p.atk+getBuffVal('atk'))*2,e.def+getDebuffVal('def'),1.5,0.5)*0.9);

  // 이벤트 바인딩
  function bindPv(btn,key){
