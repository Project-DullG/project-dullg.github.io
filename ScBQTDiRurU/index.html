<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>미라클 레인저 — 박사의 하루</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="game">
    <button class="pause-btn" id="pause-btn" style="display:none">⏸</button>
    <div class="pause-overlay" id="pause-overlay">
      <div class="pause-title">일시정지</div>
      <div class="pause-vol">
        <button class="pause-vol-btn" id="vol-btn">🔊</button>
        <input type="range" class="pause-vol-slider" id="vol-slider" min="0" max="100" value="50">
        <span class="pause-vol-label" id="vol-label">50%</span>
      </div>
      <button class="pause-menu-btn resume" id="pause-resume">▶ 계속하기</button>
      <button class="pause-menu-btn" id="pause-tut">📖 전투 안내 다시보기</button>
      <button class="pause-menu-btn" id="pause-title-btn">🏠 타이틀로</button>
      <button class="pause-menu-btn danger" id="pause-retreat" style="display:none">🏳️ 훈련 종료 (보상 획득)</button>
    </div>

    <div id="title-screen" class="screen active">
      <div class="city-sil">
        <div style="width:18px;height:65px"></div>
        <div style="width:12px;height:42px"></div>
        <div style="width:22px;height:90px"></div>
        <div style="width:10px;height:32px"></div>
        <div style="width:28px;height:100px"></div>
        <div style="width:14px;height:52px"></div>
        <div style="width:20px;height:76px"></div>
        <div style="width:11px;height:38px"></div>
        <div style="width:25px;height:88px"></div>
        <div style="width:13px;height:48px"></div>
      </div>
      <div class="t-top">MIRACLE RANGERS</div>
      <div class="t-main">미라클 레인저</div>
      <div class="t-sub">박사의 하루</div>
      <div class="t-rangers" id="t-rangers"></div>
      <div class="t-btns">
        <button class="t-start t-story" id="btn-story">▶ 스토리</button>
        <button class="t-start t-battle" id="btn-defend">▶ 전투 훈련</button>
      </div>
      <div class="t-vol" id="t-vol">
        <button class="t-vol-btn" id="t-vol-btn">🔊</button>
        <input type="range" class="t-vol-slider" id="t-vol-slider" min="0" max="100" value="50">
        <span class="t-vol-label" id="t-vol-label">50%</span>
      </div>
      <div class="t-best" id="t-best"></div>
    </div>

    <div id="scene-screen" class="screen">
      <div class="scene-bg bg-sky" id="sbg">
        <div class="s-city" id="s-city">
          <div style="width:20px;height:48px"></div>
          <div style="width:14px;height:78px"></div>
          <div style="width:26px;height:58px"></div>
          <div style="width:18px;height:92px"></div>
          <div style="width:12px;height:38px"></div>
          <div style="width:22px;height:68px"></div>
          <div style="width:15px;height:52px"></div>
          <div style="width:20px;height:82px"></div>
        </div>
        <div class="lab-bg">
          <div class="lab-wall"></div>
          <div class="lab-light"></div>
        </div>
        <div class="s-chars" id="chars"></div>
        <div class="b-hud" id="bhud">
          <div class="b-en" id="ben"></div>
          <div class="b-bar">
            <div class="b-fill enemy" id="bef" style="width:100%"></div>
          </div>
          <div class="b-lbl" id="behl"></div>
          <div class="b-turn" id="bturn"></div>
        </div>
        <div class="sfx-area" id="sfx"></div>
        <div class="drama-area" id="drama"></div>
      </div>
      <div class="b-team-bot" id="bthud">
        <div style="display:flex;align-items:center;gap:10px;padding:0 4px">
          <div class="b-lbl" style="color:#4ecca3;white-space:nowrap">RANGERS</div>
          <div class="b-bar" style="flex:1;height:12px">
            <div class="b-fill team" id="btf" style="width:100%"></div>
          </div>
          <div class="b-lbl" id="bthl" style="white-space:nowrap"></div>
        </div>
      </div>
      <div class="dlg" id="dlg">
        <div class="d-spk" id="spk"></div>
        <div class="d-txt" id="dtxt"></div>
        <div class="ch-area" id="chArea"></div>
        <div class="d-next" id="dnext">▼</div>
      </div>
      <div class="ch-card" id="chCard"></div>
      <div class="fl" id="fl"></div>
    </div>

    <div id="ending-screen" class="screen">
      <div id="endQ"></div>
      <div class="end-title">레드가 죽은 연구소</div>
      <div class="end-coming">TO BE CONTINUED</div>
      <button class="end-btn" id="btn-title">타이틀로</button>
    </div>

    <!-- 연구소 -->
    <div id="lab-screen" class="screen">
      <div class="lab-container">
        <div class="lab-title">🔬 연구소</div>
        <div class="lab-tabs">
          <button class="lab-tab active" id="lab-tab-stat">✨ 스탯 강화</button>
          <button class="lab-tab" id="lab-tab-research">🔮 연구 개발</button>
        </div>
        <div class="lab-currency" id="lab-currency"></div>
        <div class="lab-grid" id="lab-grid"></div>
        <div class="lab-nav">
          <button class="lab-nav-btn primary" id="lab-to-select">▶ 출격</button>
          <button class="lab-nav-btn" id="lab-to-title">← 타이틀</button>
          <button class="lab-reset" id="lab-reset">🔄 강화 초기화</button>
        </div>
      </div>
    </div>

    <!-- 캐릭터 선택 -->
    <div id="select-screen" class="screen">
      <div class="sel-bg">
        <div class="sel-title" id="sel-title">▼ 레인저를 선택하세요 ▼</div>
        <div class="sel-cards" id="sel-cards"></div>
        <div class="sel-info" id="sel-info"></div>
        <button class="sel-go" id="sel-go" style="display:none">▶ 출격!</button>
        <div class="sel-step" id="sel-step" style="display:none"></div>
        <button class="sel-back" id="sel-back">← 연구소로</button>
      </div>
    </div>

    <!-- 전투 화면 -->
    <div id="battle-screen" class="screen">
      <div class="bt-bg" id="bt-bg">
        <div class="bt-wave" id="bt-wave">웨이브 1</div>
        <div class="bt-pending" id="bt-pending">✨MP 0 | 🔮CE 0</div>
        <button class="bt-retreat" id="bt-retreat">⏸ 메뉴</button>
        <div class="bt-ehud" id="bt-ehud">
          <div class="bt-ename" id="bt-ename"></div>
          <div class="bt-ebar-wrap">
            <div class="bt-ebar" id="bt-ebar" style="width:100%"></div>
          </div>
          <div class="bt-ehp" id="bt-ehp"></div>
        </div>
        <div class="bt-field" id="bt-field"></div>
        <div class="bt-phud">
          <div class="bt-pbar-row"><span class="bt-plbl">HP</span>
            <div class="bt-pbar-wrap">
              <div class="bt-pbar hp" id="bt-php" style="width:100%"></div>
              <div class="bt-pbar shield" id="bt-pshield" style="width:0%"></div>
            </div><span class="bt-pval" id="bt-phpv"></span>
          </div>
          <div class="bt-pbar-row"><span class="bt-plbl">SP</span>
            <div class="bt-pbar-wrap">
              <div class="bt-pbar sp" id="bt-psp" style="width:100%"></div>
            </div><span class="bt-pval" id="bt-pspv"></span>
          </div>
          <div class="bt-pstats-row" id="bt-pstats"></div>
        </div>
        <div class="bt-status-row" id="bt-status"></div>
        <div class="bt-acts" id="bt-acts"></div>
        <div class="bt-preview" id="bt-preview"></div>
        <div class="bt-log" id="bt-log"></div>
        <div class="bt-overlay" id="bt-overlay"></div>
        <div class="bt-fx" id="bt-fx"></div>
        <div class="bt-drama" id="bt-drama"></div>
      </div>
    </div>

    <!-- 보상 선택 -->
    <div id="reward-screen" class="screen">
      <div class="rw-bg">
        <div class="rw-title" id="rw-title">★ 웨이브 클리어 ★</div>
        <div class="rw-sub">보상을 선택하세요</div>
        <div class="rw-cards" id="rw-cards"></div>
        <button class="rw-retreat" id="rw-retreat" style="display:none">🏳️ 여기서 훈련 종료 (보상 전액 획득)</button>
      </div>
    </div>

    <!-- 게임오버 -->
    <div id="gameover-screen" class="screen">
      <div class="go-bg">
        <div class="go-title">GAME OVER</div>
        <div class="go-wave" id="go-wave">도달 웨이브: 1</div>
        <div class="go-kills" id="go-kills">처치한 괴인: 0</div>
        <div class="go-gold" id="go-gold"></div>
        <div class="go-rp" id="go-rp"></div>
        <div class="go-best" id="go-best"></div>
        <div class="go-btns">
          <button class="go-btn retry" id="go-retry">▶ 다시 도전</button>
          <button class="go-btn" id="go-title">타이틀로</button>
        </div>
      </div>
    </div>

  </div>
  <script src="story.js"></script>
  <script src="engine.js"></script>
</body>

</html>
