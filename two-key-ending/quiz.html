<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="보충반의 사라진 열쇠 · 시나리오 이해 점검 퀴즈 (7문항)">
  <title>보충반의 사라진 열쇠 · 시나리오 이해 점검</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <a href="index.html" class="tag" style="text-decoration:none">STEP 2 · QUIZ</a>
      <h1>시나리오 이해 점검</h1>
      <p class="subtitle">사건의 전말을 보기 전, 본인이 추리한 내용을 점검합니다.</p>
    </header>

    <div class="step-indicator" aria-label="진행 단계 2/3">
      <span class="step-dot done">1</span>
      <span class="step-line done"></span>
      <span class="step-dot current">2</span>
      <span class="step-line"></span>
      <span class="step-dot">3</span>
    </div>
    <p class="step-label">점수 계산 → 시나리오 이해 점검 → 엔딩</p>

    <section id="char-select" class="guide-box" hidden>
      <div class="guide-title">캐릭터 선택</div>
      <p>이전 단계의 캐릭터 정보를 찾지 못했습니다. 다시 선택해 주세요.</p>
      <div class="char-grid">
        <button class="char-btn" data-char="윤지원" style="--card-color:var(--blue);--card-glow:var(--blue-soft)">윤지원</button>
        <button class="char-btn" data-char="박세준" style="--card-color:var(--violet);--card-glow:var(--violet-soft)">박세준</button>
        <button class="char-btn" data-char="차하린" style="--card-color:var(--red);--card-glow:var(--red-soft)">차하린</button>
        <button class="char-btn" data-char="한도경" style="--card-color:var(--green);--card-glow:var(--green-soft)">한도경</button>
      </div>
    </section>

    <section id="quiz" hidden>
      <div class="quiz-bar">
        <span class="active-char" id="activeChar"></span>
        <span class="quiz-progress" id="quizProgress">0 / 7 응답</span>
      </div>
      <div id="questions"></div>
      <button class="submit-btn" id="submitBtn" disabled>결과 확인</button>
    </section>

    <section id="result" hidden>
      <section class="chapter conclusion result-card" style="--card-color:var(--gold);--card-glow:var(--gold-soft)">
        <div class="chapter-num">RESULT</div>
        <div class="chapter-title">시나리오 이해 점수</div>
        <p class="result-score"><strong id="scoreNum">0</strong> <span class="result-of">/ 7</span></p>
        <p class="result-side" id="resultSide"></p>
      </section>
      <section class="chapter answer-summary" style="--card-color:var(--gold);--card-glow:var(--gold-soft)">
        <div class="chapter-num">RESPONSES</div>
        <div class="chapter-title">응답 요약</div>
        <ol class="answer-list" id="answerList"></ol>
      </section>
      <p class="result-note" id="saveStatus"></p>
      <a href="endings.html" class="next-step-btn">다음 단계 · 엔딩 보기 &#8594;<span class="next-sub">지목된 인물의 결말을 본 뒤, 사건의 전말을 확인합니다</span></a>
      <button class="retry-btn" id="retryBtn">다시 풀기</button>
    </section>

    <a href="score.html" class="back-link">&#8592; STEP 1 점수 계산으로 돌아가기</a>
    <footer class="footer">보충반의 사라진 열쇠 · Ending Book</footer>
  </main>

  <script>
    const QUESTIONS = [
      {
        q: "자료함을 열어 재시험 정답표를 꺼낸 사람은?",
        choices: ["윤지원", "박세준", "차하린", "한도경"],
        answer: 2,
        explain: "차하린은 토요일 약속을 지키고 싶어 자료함 열쇠로 정답표를 꺼냈다. 단, 열쇠는 사용 직후 선반에 반환했다."
      },
      {
        q: "윤지원의 필통 안에 핸드폰함 열쇠를 슬쩍 넣은 사람은?",
        choices: ["윤지원 본인", "박세준", "차하린", "한도경"],
        answer: 3,
        explain: "한도경은 두 열쇠를 동시에 가지고 있는 것이 위험해, 가장 흔들리고 있던 윤지원의 필통에 핸드폰함 열쇠를 떠넘겼다."
      },
      {
        q: "한도경에게 사건의 동기를 만들어 준 단서는?",
        choices: ["영어 단어장", "네 컷 사진", "상담실의 이면지", "KTX 티켓"],
        answer: 2,
        explain: '상담실 이면지 뒷면의 "재시험 미진행 시, 대상자는 토요일 보충반 출석" 규정을 본 인물은 도경 한 사람뿐이다.'
      },
      {
        q: "박세준의 가방 안에 들어 있던 것은?",
        choices: ["자료함 열쇠", "재시험 정답표", "한도경의 영어책", "핸드폰함 열쇠"],
        answer: 2,
        explain: "박세준은 시험 불안 때문에 한도경의 영어책을 잠깐 가져왔다가 돌려놓지 못하고 가방에 넣었다."
      },
      {
        q: "두 열쇠가 함께 사라진 시점, 자습실 밖에서 관리 선반 방향으로 이동한 인물은?",
        choices: ["윤지원 (정수기·화장실)", "박세준 (자기 자리)", "차하린 (이미 자리로 복귀)", "한도경 (사라진 영어책을 찾으러)"],
        answer: 3,
        explain: "한도경은 사라진 자기 영어책을 찾는다는 핑계로 자습실을 두 번째로 나갔고, 그 동선 안에 관리 선반이 있었다."
      },
      {
        q: "차하린은 자료함 열쇠를 사용한 후 어디에 두었는가?",
        choices: ["자기 가방", "자료함 안", "선반 안쪽 고리 (원래 자리)", "자료함 위"],
        answer: 2,
        explain: '하린은 정답표만 가져가고, 열쇠는 곧바로 선반 안쪽 고리에 다시 걸어두었다. 그래서 "열쇠 실종"은 그 시점 이후에 시작된다.'
      },
      {
        q: "결정적 물증인 자료함 열쇠는 사건 발각 시점에 어디에 있었는가?",
        choices: ["한도경의 가방", "윤지원의 필통", "자료함 안", "박세준의 가방"],
        answer: 0,
        explain: "도경은 위험 분산을 위해 핸드폰함 열쇠만 떠넘기고, 자료함 열쇠는 자기 가방에 그대로 보관했다. 이것이 사건의 단일 결정타다."
      }
    ];

    // === Google Forms 연동 ===========================================
    const FORMS_ENDPOINT = 'https://docs.google.com/forms/d/e/1FAIpQLSfuFxbkJ4wYZ-Js7sKnKif-gVsnm3kQC_i1M_TL598z_n7a7A/formResponse';
    const FORMS_FIELDS = {
      character:       'entry.467603329',
      score_calc:      'entry.307547757',
      mission_status:  'entry.1618865703',
      quiz_score:      'entry.1789114153',
      quiz_answers:    'entry.738327544',
      timestamp:       'entry.502976306'
    };
    // =================================================================

    const STORAGE_KEY = 'two-key-state';

    function loadState() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }
    function saveState(patch) {
      const state = { ...loadState(), ...patch };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
    }

    const state = { character: null, answers: Array(QUESTIONS.length).fill(null), submitted: false };

    const $charSelect = document.getElementById('char-select');
    const $quiz = document.getElementById('quiz');
    const $result = document.getElementById('result');
    const $questions = document.getElementById('questions');
    const $activeChar = document.getElementById('activeChar');
    const $progress = document.getElementById('quizProgress');
    const $submitBtn = document.getElementById('submitBtn');
    const $scoreNum = document.getElementById('scoreNum');
    const $resultSide = document.getElementById('resultSide');
    const $answerList = document.getElementById('answerList');
    const $saveStatus = document.getElementById('saveStatus');
    const $retryBtn = document.getElementById('retryBtn');

    document.querySelectorAll('.char-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const color = btn.style.getPropertyValue('--card-color');
        startQuiz(btn.dataset.char, color);
        saveState({ character: btn.dataset.char });
      });
    });

    function startQuiz(character, color) {
      state.character = character;
      $activeChar.textContent = '플레이어 · ' + character;
      if (color) $activeChar.style.setProperty('--card-color', color);
      $charSelect.hidden = true;
      $quiz.hidden = false;
      renderQuestions();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function colorForCharacter(character) {
      const map = { '윤지원': 'var(--blue)', '박세준': 'var(--violet)', '차하린': 'var(--red)', '한도경': 'var(--green)' };
      return map[character] || '';
    }

    function renderQuestions() {
      QUESTIONS.forEach((item, idx) => {
        const article = document.createElement('article');
        article.className = 'chapter question';
        article.dataset.q = idx;

        const num = document.createElement('div');
        num.className = 'chapter-num';
        num.textContent = 'Q' + (idx + 1);
        article.appendChild(num);

        const qText = document.createElement('h3');
        qText.className = 'q-text';
        qText.textContent = item.q;
        article.appendChild(qText);

        const choicesEl = document.createElement('div');
        choicesEl.className = 'q-choices';
        item.choices.forEach((c, ci) => {
          const label = document.createElement('label');
          label.className = 'q-choice';
          const input = document.createElement('input');
          input.type = 'radio';
          input.name = 'q' + idx;
          input.value = String(ci);
          const span = document.createElement('span');
          span.className = 'q-choice-text';
          span.textContent = c;
          label.appendChild(input);
          label.appendChild(span);
          choicesEl.appendChild(label);
        });
        article.appendChild(choicesEl);

        const ex = document.createElement('div');
        ex.className = 'explanation';
        ex.hidden = true;
        article.appendChild(ex);

        $questions.appendChild(article);
      });

      $questions.addEventListener('change', e => {
        if (e.target.matches('input[type="radio"]') && !state.submitted) {
          const card = e.target.closest('.question');
          const q = Number(card.dataset.q);
          state.answers[q] = Number(e.target.value);
          updateProgress();
        }
      });
    }

    function updateProgress() {
      const answered = state.answers.filter(a => a !== null).length;
      $progress.textContent = answered + ' / ' + QUESTIONS.length + ' 응답';
      $submitBtn.disabled = answered < QUESTIONS.length;
    }

    $submitBtn.addEventListener('click', submit);

    function submit() {
      if (state.submitted) return;
      state.submitted = true;
      let score = 0;

      document.querySelectorAll('.question').forEach((card, idx) => {
        const correct = QUESTIONS[idx].answer;
        const picked = state.answers[idx];
        card.querySelectorAll('.q-choice').forEach((label, li) => {
          label.querySelector('input').disabled = true;
          if (li === correct) label.classList.add('is-correct');
          else if (li === picked) label.classList.add('is-wrong');
        });

        const ex = card.querySelector('.explanation');
        ex.hidden = false;
        ex.textContent = '';
        const verdict = document.createElement('strong');
        verdict.textContent = picked === correct ? '정답.' : '오답.';
        if (picked !== correct) verdict.classList.add('is-wrong-text');
        ex.appendChild(verdict);
        ex.appendChild(document.createTextNode(' ' + QUESTIONS[idx].explain));

        if (picked === correct) score++;
      });

      $submitBtn.hidden = true;
      $result.hidden = false;
      $scoreNum.textContent = String(score);

      const saved = loadState();
      if (typeof saved.scoreCalc === 'number') {
        $resultSide.textContent = '미션 점수 ' + saved.scoreCalc + '점 · 시나리오 이해 ' + score + ' / 7';
      } else {
        $resultSide.textContent = '시나리오 이해 ' + score + ' / 7';
      }

      renderAnswerSummary();
      saveResult(score);
      $result.scrollIntoView({ behavior: 'smooth' });
    }

    function formatAnswerText(idx) {
      const item = QUESTIONS[idx];
      const picked = state.answers[idx];
      const pickedText = (picked !== null && picked !== undefined) ? item.choices[picked] : '(미답)';
      const correct = picked === item.answer;
      return 'Q' + (idx + 1) + '. ' + item.q + ' → ' + pickedText + ' (' + (correct ? '정답' : '오답') + ')';
    }

    function renderAnswerSummary() {
      $answerList.textContent = '';
      QUESTIONS.forEach((item, idx) => {
        const picked = state.answers[idx];
        const correct = picked === item.answer;

        const li = document.createElement('li');
        li.className = 'answer-item ' + (correct ? 'is-correct' : 'is-wrong');

        const qLine = document.createElement('div');
        qLine.className = 'answer-q';
        qLine.textContent = 'Q' + (idx + 1) + '. ' + item.q;

        const aLine = document.createElement('div');
        aLine.className = 'answer-pick';
        const verdict = document.createElement('strong');
        verdict.textContent = correct ? '정답' : '오답';
        verdict.className = correct ? 'verdict-correct' : 'verdict-wrong';
        aLine.appendChild(verdict);
        aLine.appendChild(document.createTextNode(' · 내 답: ' + (item.choices[picked] || '(미답)')));
        if (!correct) {
          const correctEl = document.createElement('div');
          correctEl.className = 'answer-correct-line';
          correctEl.textContent = '정답: ' + item.choices[item.answer];
          li.appendChild(qLine);
          li.appendChild(aLine);
          li.appendChild(correctEl);
        } else {
          li.appendChild(qLine);
          li.appendChild(aLine);
        }

        $answerList.appendChild(li);
      });
    }

    function saveResult(quizScore) {
      const saved = loadState();
      const answersText = QUESTIONS.map((_, idx) => formatAnswerText(idx)).join('\n');
      const missionText = (saved.scoreItems || []).join(' / ') || '(달성 없음)';
      const payload = {
        character:      state.character,
        score_calc:     typeof saved.scoreCalc === 'number' ? saved.scoreCalc : 0,
        mission_status: missionText,
        quiz_score:     quizScore,
        quiz_answers:   answersText,
        timestamp:      new Date().toISOString()
      };
      try { localStorage.setItem('two-key-quiz-result', JSON.stringify(payload)); } catch {}

      if (FORMS_ENDPOINT && FORMS_FIELDS.character && !FORMS_FIELDS.character.endsWith('XXXXXXXX')) {
        const fd = new FormData();
        fd.append(FORMS_FIELDS.character,      payload.character || '');
        fd.append(FORMS_FIELDS.score_calc,     String(payload.score_calc));
        fd.append(FORMS_FIELDS.mission_status, payload.mission_status);
        fd.append(FORMS_FIELDS.quiz_score,     String(payload.quiz_score));
        fd.append(FORMS_FIELDS.quiz_answers,   payload.quiz_answers);
        fd.append(FORMS_FIELDS.timestamp,      payload.timestamp);
        fetch(FORMS_ENDPOINT, { method: 'POST', body: fd, mode: 'no-cors' })
          .then(() => { $saveStatus.textContent = '결과가 서버에 기록되었습니다.'; })
          .catch(() => { $saveStatus.textContent = '서버 전송 실패 — 로컬에만 저장되었습니다.'; });
      } else {
        $saveStatus.textContent = '결과가 로컬에 저장되었습니다. (서버 연동 미설정)';
      }
    }

    $retryBtn.addEventListener('click', () => location.reload());

    // === 진입 시 localStorage 인계 ===
    const saved = loadState();
    if (saved.character) {
      startQuiz(saved.character, colorForCharacter(saved.character));
    } else {
      $charSelect.hidden = false;
    }
  </script>
</body>
</html>
