<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Pages Test</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f4f7ff, #e8f5f0);
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: min(90%, 640px);
      background: white;
      padding: 48px 36px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: #eef3ff;
      color: #3b5bfd;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      margin: 0 0 16px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #555;
      margin: 0 0 28px;
    }

    button {
      border: none;
      background: #3b5bfd;
      color: white;
      padding: 14px 22px;
      font-size: 16px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #2847d8;
      transform: translateY(-2px);
    }

    .result {
      margin-top: 24px;
      font-size: 15px;
      color: #777;
    }
  </style>
</head>

<body>
  <main class="card">
    <div class="badge">GitHub Pages Test</div>

    <h1>배포 성공!</h1>

    <p>
      이 페이지가 보인다면 GitHub Pages가 정상적으로 작동하고 있습니다.<br />
      이제 원하는 HTML, CSS, JavaScript 파일을 추가하면 됩니다.
    </p>

    <button onclick="showMessage()">테스트 버튼</button>

    <div class="result" id="result">
      버튼을 눌러 JavaScript 작동 여부를 확인하세요.
    </div>
  </main>

  <script>
    function showMessage() {
      const result = document.getElementById("result");
      const now = new Date().toLocaleString("ko-KR");

      result.textContent = "JavaScript도 정상 작동 중입니다. 확인 시간: " + now;
    }
  </script>
</body>
</html>
